name: 日次リアルタイム市場投稿生成

on:
  schedule:
    # 月〜金 07:00 JST = 前日 22:00 UTC（日〜木）
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install anthropic yfinance

      - name: 当日の市場投稿を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_tweets.py --mode daily

      - name: 生成ファイルをコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/output/
          git diff --staged --quiet || git commit -m "⚡ 本日の市場投稿 $(date +'%Y-%m-%d')"
          git push
